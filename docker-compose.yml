services:

  # Ollama -- runs Llama2-7B and FinQA-7B locally
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
      - shared_models:/shared_models
    restart: unless-stopped

  # Demo Streamlit app
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finetune-vs-rag-demo
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL=llama2
      - FINETUNED_LLM_MODEL=finqa-7b
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - shared_models:/shared_models
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  shared_models:
